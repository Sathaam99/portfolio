<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile image</title>
  <desc id="desc">Gradient avatar with initials MS for Mohammed Sathaam</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#g)"/>
  <circle cx="200" cy="120" r="70" fill="rgba(255,255,255,0.16)"/>
  <text x="200" y="180" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="110" font-weight="800">MS</text>
  <text x="200" y="250" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-family="Inter, sans-serif" font-size="24" font-weight="600">DevOps Engineer</text>
</svg>